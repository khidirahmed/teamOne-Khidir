<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body>

  <!-- LANDING PAGE -->
  <div id="landing" class="screen active">
    <h1>Bobcat Go!</h1>
    <div class="main-content">
      <!----will be used later for map UI>
      <div class="maps">
        <button class="map-btn" onclick="selectMap(this)">

        <button class="map-btn" onclick="selectMap(this)">Map 2</button>
      </div>
    -->
      <div class="right-panel">
        <img src="frontsprint.png" alt="Bobcat" class="cat-img" />
        <div class="login-form">
          <div class="form-row">
            <label>username:</label>
            <input type="text" id="username" autocomplete="off" placeholder="enter name" />
          </div>
          <div class="form-row">
            <label>password:</label>
            <input type="text" id="password" autocomplete="off" placeholder="enter password" />
          </div>
        </div>
        <div class="auth-btns">
  <button class="play-btn" onclick="goSignUp()">
    <img src="signup.png" alt="SIGN UP" style="height:33px; image-rendering:pixelated;" />
  </button>
  <button class="play-btn" onclick="goSignIn()">
    <img src="signin.png" alt="SIGN IN" style="height:33px; image-rendering:pixelated;" />
  </button>
</div>
      </div>
    </div>
    <div class="tagline">***Explore New Worlds***</div>
    <div class="bottom-bar">
      <button class="lb-link-btn" onclick="showScreen('leaderboard')">🏆 Leaderboard</button>
    </div>
  </div>

  <!-- GAME PLACEHOLDER -->
  <div id="game" class="screen">
    <p>[ game screen ]<br />coming soon</p>
    <button class="back-btn-game" onclick="showScreen('landing')">Back</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('landing')">Back</button>
      <div class="music-btn">🎵</div>
    </div>
    <div class="lb-panel">
      <div class="lb-title">Leaderboard</div>
      <div class="lb-header">
        <div>User</div>
        <div>Time</div>
        <div>Rank</div>
      </div>
      <div class="lb-row">
        <div>username1</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-1">1st</div>
      </div>
      <div class="lb-row">
        <div>username2</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-2">2nd</div>
      </div>
      <div class="lb-row">
        <div>username3</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-3">3rd</div>
      </div>
      <div class="lb-row">
        <div>username4</div>
        <div>00:00:00</div>
        <div>4th</div>
      </div>
      <div class="lb-row">
        <div>username5</div>
        <div>00:00:00</div>
        <div>5th</div>
      </div>
      <div class="lb-row">
        <div>username6</div>
        <div>00:00:00</div>
        <div>6th</div>
      </div>
      <div class="lb-row">
        <div>username7</div>
        <div>00:00:00</div>
        <div>7th</div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = '';

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function selectMap(btn) {
      document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    /*
    function goPlay() {
      const input = document.getElementById('username').value.trim();
      if (input) currentUser = input;
      updateLeaderboard();
      showScreen('game');
    }
    */
    

    function updateLeaderboard() {
      if (!currentUser) return;
      // highlight the current user's row if they appear, otherwise add them
      const rows = document.querySelectorAll('.lb-row');
      let found = false;
      rows.forEach(row => {
        const cell = row.querySelector('div');
        if (cell.textContent === currentUser) {
          cell.style.fontWeight = 'bold';
          cell.style.color = '#5a4fa0';
          found = true;
        }
      });
      // if not already on board, update last row with their name
      if (!found && rows.length > 0) {
        rows[rows.length - 1].querySelector('div').textContent = currentUser;
      }
    }
  </script>
  
</body>

</html>
