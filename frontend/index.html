<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bobcat Go!</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --purple: #8B7FD4;
      --purple-dark: #7066bf;
      --gray-btn: #C8C4BC;
      --gray-btn-dark: #b0aba0;
      --green-btn: #4CAF50;
      --green-btn-dark: #388E3C;
      --orange: #E8883A;
      --text-dark: #2a2a2a;
      --panel-bg: rgba(255, 255, 255, 0.15);
    }

    body {

      font-family: 'Press Start 2P', monospace;
      background: var(--purple);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    /* pixel grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .screen {
      display: none;
      width: 640px;
      background: var(--purple);
      border: 4px solid #5a4fa0;
      box-shadow: 8px 8px 0 #3d3570, inset 0 0 0 2px rgba(255, 255, 255, 0.1);
      padding: 32px 40px 40px;
      position: relative;
      animation: fadeIn 0.2s ease;
    }

    .screen.active {
      display: block;
    }

    #game.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.97);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ── LANDING PAGE ── */
    #landing h1 {
      text-align: center;
      font-size: 2.4rem;
      color: #fff;
      text-shadow: 4px 4px 0 #3d3570;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    .main-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .maps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .map-btn {
      background: transparent;
      border: 3px solid #888;
      box-shadow: 4px 4px 0 #666;
      padding: 28px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      color: var(--text-dark);
      cursor: pointer;
      text-align: center;
      transition: transform 0.08s, box-shadow 0.08s;
      width: 100%;
    }

    .map-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #666;
    }

    .map-btn:active,
    .map-btn.selected {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 #666;
      background: var(--gray-btn-dark);
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-width: 160px;
    }

    .cat-img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      border: 3px solid rgba(255, 255, 255, 0.3)
    }

    .cat-img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      border: 3px solid rgba(255, 255, 255, 0.3);
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row label {
      font-size: 0.45rem;
      color: #fff;
      white-space: nowrap;
      text-shadow: 1px 1px 0 #3d3570;
      min-width: 68px;
    }

    .form-row input {
      flex: 1;
      background: #d8d4cc;
      border: 2px solid #888;
      box-shadow: 2px 2px 0 #555 inset;
      padding: 6px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--text-dark);
      outline: none;
    }

    .form-row input:focus {
      border-color: #5a4fa0;
      background: #e8e4dc;
    }

    .play-btn {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s;
    }

    .play-btn:hover {
      transform: translate(-2px, -2px);
    }

    .play-btn:active {
      transform: translate(2px, 2px);
    }

    .tagline {
      text-align: center;
      color: #fff;
      font-size: 0.6rem;
      margin-top: 28px;
      text-shadow: 2px 2px 0 #3d3570;
      letter-spacing: 1px;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .lb-link-btn {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    .lb-link-btn:hover {
      border-color: rgba(255, 255, 255, 0.9);
      color: #fff;
    }

    /* ── GAME PLACEHOLDER ── */
    #game {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 360px;
      gap: 24px;
    }

    #game p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.55rem;
      text-align: center;
      line-height: 2;
    }

    .back-btn-game {
      background: var(--orange);
      border: 3px solid #a05a10;
      box-shadow: 3px 3px 0 #6a3a08;
      padding: 10px 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #fff;
      text-shadow: 1px 1px 0 #6a3a08;
      cursor: pointer;
      border-radius: 20px;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .back-btn-game:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #6a3a08;
    }

    .back-btn-game:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 #6a3a08;
    }

    /* ── LEADERBOARD ── */
    #leaderboard {
      padding: 24px 32px 32px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back-btn {
      background: var(--orange);
      border: 3px solid #a05a10;
      box-shadow: 3px 3px 0 #6a3a08;
      padding: 10px 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #fff;
      text-shadow: 1px 1px 0 #6a3a08;
      cursor: pointer;
      border-radius: 20px;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .back-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #6a3a08;
    }

    .back-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 #6a3a08;
    }

    .music-btn {
      background: var(--orange);
      border: 3px solid #a05a10;
      box-shadow: 3px 3px 0 #6a3a08;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s;
    }

    .music-btn:hover {
      transform: scale(1.1);
    }

    .lb-panel {
      background: #c8c4bc;
      border: 3px solid #888;
      box-shadow: 4px 4px 0 #555;
      padding: 16px;
    }

    .lb-title {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-dark);
      background: #d8d4cc;
      border: 2px solid #aaa;
      padding: 10px;
      margin-bottom: 12px;
    }

    .lb-header,
    .lb-row {
      display: grid;
      grid-template-columns: 1fr 1fr 80px;
      gap: 4px;
      margin-bottom: 4px;
    }

    .lb-header>div {
      background: #b8b4ac;
      border: 2px solid #888;
      padding: 8px 10px;
      font-size: 0.5rem;
      color: var(--text-dark);
      text-align: center;
    }

    .lb-row>div {
      background: #d0ccc4;
      border: 2px solid #aaa;
      padding: 8px 10px;
      font-size: 0.45rem;
      color: var(--text-dark);
      text-align: center;
    }

    .rank-badge {
      border-radius: 12px;
      font-size: 0.45rem !important;
      color: #fff !important;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
    }

    .rank-1 {
      background: #8B7FD4 !important;
      border-color: #5a4fa0 !important;
    }

    .rank-2 {
      background: #9e9e9e !important;
      border-color: #666 !important;
    }

    .rank-3 {
      background: #cd7c3a !important;
      border-color: #8a4a10 !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</head>

<body>

  <!-- LANDING PAGE -->
  <div id="landing" class="screen active">
    <h1>Bobcat Go!</h1>
    <div class="main-content">
      <div class="maps">
        <button class="map-btn" onclick="selectMap(this)">
          <img src="map1.png" alt="map1" style="height:48px; image-rendering:pixelated;" />
        </button>

        <button class="map-btn" onclick="selectMap(this)">Map 2</button>
      </div>
      <div class="right-panel">
        <img src="frontsprint.png" alt="Bobcat" class="cat-img" />
        <div class="login-form">
          <div class="form-row">
            <label>username:</label>
            <input type="text" id="username" autocomplete="off" placeholder="enter name" />
          </div>
          <div class="form-row">
            <label>password:</label>
            <input type="text" id="password" autocomplete="off" placeholder="enter password" />
          </div>
        </div>
        <button class="play-btn" onclick="goPlay()">
          <img src="image 10.png" alt="PLAY" style="height:48px; image-rendering:pixelated;" />
        </button>
      </div>
    </div>
    <div class="tagline">***Explore New Worlds***</div>
    <div class="bottom-bar">
      <button class="lb-link-btn" onclick="showScreen('leaderboard')">🏆 Leaderboard</button>
    </div>
  </div>

  <!-- GAME PLACEHOLDER -->
  <div id="game" class="screen">
    <p>[ game screen ]<br />coming soon</p>
    <button class="back-btn-game" onclick="showScreen('landing')">Back</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('landing')">Back</button>
      <div class="music-btn">🎵</div>
    </div>
    <div class="lb-panel">
      <div class="lb-title">Leaderboard</div>
      <div class="lb-header">
        <div>User</div>
        <div>Time</div>
        <div>Rank</div>
      </div>
      <div class="lb-row">
        <div>username1</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-1">1st</div>
      </div>
      <div class="lb-row">
        <div>username2</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-2">2nd</div>
      </div>
      <div class="lb-row">
        <div>username3</div>
        <div>00:00:00</div>
        <div class="rank-badge rank-3">3rd</div>
      </div>
      <div class="lb-row">
        <div>username4</div>
        <div>00:00:00</div>
        <div>4th</div>
      </div>
      <div class="lb-row">
        <div>username5</div>
        <div>00:00:00</div>
        <div>5th</div>
      </div>
      <div class="lb-row">
        <div>username6</div>
        <div>00:00:00</div>
        <div>6th</div>
      </div>
      <div class="lb-row">
        <div>username7</div>
        <div>00:00:00</div>
        <div>7th</div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = '';

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function selectMap(btn) {
      document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    /*
    function goPlay() {
      const input = document.getElementById('username').value.trim();
      if (input) currentUser = input;
      updateLeaderboard();
      showScreen('game');
    }
    */
    

    function updateLeaderboard() {
      if (!currentUser) return;
      // highlight the current user's row if they appear, otherwise add them
      const rows = document.querySelectorAll('.lb-row');
      let found = false;
      rows.forEach(row => {
        const cell = row.querySelector('div');
        if (cell.textContent === currentUser) {
          cell.style.fontWeight = 'bold';
          cell.style.color = '#5a4fa0';
          found = true;
        }
      });
      // if not already on board, update last row with their name
      if (!found && rows.length > 0) {
        rows[rows.length - 1].querySelector('div').textContent = currentUser;
      }
    }
  </script>
  
</body>

</html>
